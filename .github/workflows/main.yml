# .github/workflows/deploy.yml
name: Deploy frontend

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install & Build
        working-directory: ./reactPract/vite-project
        run: |
          npm ci
          npm run build
